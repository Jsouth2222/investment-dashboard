name: ガソリン価格を更新

on:
  schedule:
    - cron: '0 2 * * 3'  # 毎週水曜日 11:00 JST（資源エネルギー庁更新日）
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update-gasoline:
    runs-on: ubuntu-latest
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ガソリン価格を取得
        run: node scripts/fetch-gasoline.mjs

      - name: データをコミット＆プッシュ
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/gasoline.json
          git diff --staged --quiet || git commit -m "chore: update gasoline price data"
          git push
